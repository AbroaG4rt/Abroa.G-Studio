<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Omoshiroi Japan — Learn Japanese · JLPT · Link in Bio</title>
  <!-- Favicon (editable path) -->
  <link rel="icon" type="image/png" href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgC2LPhITlQxsoRUgOc0f5_c4gEnshpOOVzGDCnDgWk4BHl_1LkTvjtfIZ3znsKeYYQhvaDEk1hWzrsQHiy_Uk13AXRgxgF496fpU0dB47zQvtA82-Pxg9Z_HWmH_NrGiTs1JsfO1LmXB4rux5MNPUHKALf83WSsShYAt_aRp3VGOfhkOy2XVm2Hgl1z9Q/s16/favicon-16x16.png">
  <!-- Google Fonts + Font Awesome -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- QR Code library -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* ---------- VARIABLES (premium, japanese minimal) ---------- */
    :root {
      --bg-gif-url: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhBEDjLeceM1C8tI8kGAhpkR8gsQ78f9VjYlpRAXgVdrwIglLcG3BU2ZWRbazVHkadphGO_SaCEaymhrykUS7VYo-2mvbqV9GNw-NvPWKbGWQOF-x37tQ_fvZSbcwvGwoFRQmojRY1-KQsZgZvMnELSiGH6wrv2PlCJxqaLa86aybTqlryiOrK3nyzwX_o/s800/ezgif-4b2cb6e6b00b10a2.gif'); /* replace with your own GIF */
      --overlay-dark: rgba(0, 0, 0, 0.45);
      --glass-bg: rgba(255, 255, 255, 0.82);
      --glass-border: rgba(255, 255, 255, 0.5);
      --card-bg: rgba(255, 255, 255, 0.9);
      --text-primary: #1E2F3A;
      --text-secondary: #4A627A;
      --accent: #D43F34;      /* vermillion red - japanese modern */
      --accent-glow: rgba(212, 63, 52, 0.3);
      --shadow-sm: 0 15px 35px -12px rgba(0, 0, 0, 0.08);
      --shadow-md: 0 25px 40px -16px rgba(0, 0, 0, 0.12);
      --transition-click: 0.12s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      --transition-hover: 0.18s ease-out;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #F9F6EF;
      color: var(--text-primary);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    /* ---------- ANIMATED GIF BACKGROUND + OVERLAY ---------- */
    .gif-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: var(--bg-gif-url);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0.6;           /* subtle transparency */
      z-index: -2;
      pointer-events: none;
    }
    .dark-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--overlay-dark);
      backdrop-filter: blur(2px);
      z-index: -1;
    }

    /* main container */
    .container {
      max-width: 820px;
      margin: 1.5rem auto;
      padding: 0 1.2rem;
      position: relative;
      z-index: 2;
    }

    /* glass card */
    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      border-radius: 2.2rem;
      border: 1px solid var(--glass-border);
      box-shadow: var(--shadow-sm);
    }

    /* profile */
    .profile {
      text-align: center;
      padding: 2rem 1.2rem 1.5rem;
      margin-bottom: 1.8rem;
    }
    .avatar {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--accent);
      box-shadow: 0 20px 30px -8px rgba(0,0,0,0.2);
      transition: transform 0.2s;
      animation: fadeScaleUp 0.6s cubic-bezier(0.2,0.9,0.4,1.1);
    }
    @keyframes fadeScaleUp {
      0% { opacity: 0; transform: scale(0.92); }
      100% { opacity: 1; transform: scale(1); }
    }
    .username {
      font-size: 1.9rem;
      font-weight: 800;
      margin-top: 0.8rem;
      letter-spacing: -0.02em;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .verified-badge {
      background: var(--accent);
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.2rem 0.7rem;
      border-radius: 40px;
      color: white;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .bio {
      color: var(--text-secondary);
      margin-top: 0.8rem;
      font-weight: 450;
      line-height: 1.45;
      max-width: 88%;
      margin-left: auto;
      margin-right: auto;
      font-size: 0.9rem;
    }

    /* TABS */
    .tabs {
      display: flex;
      gap: 0.8rem;
      background: rgba(255,255,240,0.4);
      backdrop-filter: blur(8px);
      padding: 0.5rem;
      border-radius: 100px;
      width: fit-content;
      margin: 0 auto 2rem auto;
      border: 1px solid var(--glass-border);
    }
    .tab-btn {
      background: transparent;
      border: none;
      padding: 0.6rem 1.8rem;
      font-weight: 600;
      border-radius: 60px;
      font-size: 0.95rem;
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.2s;
      font-family: inherit;
    }
    .tab-btn.active {
      background: var(--accent);
      color: white;
      box-shadow: 0 6px 14px var(--accent-glow);
    }

    /* Link Buttons (core) */
    .links-grid {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .link-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      background: var(--card-bg);
      backdrop-filter: blur(4px);
      padding: 1rem 1rem;
      border-radius: 80px;
      text-decoration: none;
      color: var(--text-primary);
      font-weight: 600;
      font-size: 1rem;
      border: 1px solid rgba(255,255,255,0.5);
      transition: transform var(--transition-hover), box-shadow var(--transition-hover);
      box-shadow: var(--shadow-sm);
      cursor: pointer;
    }
    .link-btn i {
      font-size: 1.3rem;
      color: var(--accent);
    }
    /* hover effect */
    .link-btn:hover {
      transform: scale(1.02) translateY(-2px);
      box-shadow: 0 20px 30px -12px var(--accent-glow);
      border-color: var(--accent);
    }
    /* click active (micro-interaction) */
    .link-btn:active, .buy-btn:active, .social-icon:active, .tab-btn:active, .share-trigger:active, .qr-trigger:active {
      transform: scale(0.96);
      opacity: 0.9;
      transition: transform var(--transition-click), opacity var(--transition-click);
    }

    /* Shop grid */
    .shop-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 1.5rem;
    }
    @media (max-width: 640px) {
      .shop-grid {
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }
    }
    @media (max-width: 480px) {
      .shop-grid {
        grid-template-columns: 1fr;
      }
    }
    .product-card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border-radius: 1.5rem;
      padding: 0.9rem;
      transition: all 0.25s ease;
      border: 1px solid var(--glass-border);
    }
    .product-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-md);
      border-color: var(--accent);
    }
    .product-img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 1.2rem;
      background: #EDE9E3;
    }
    .product-title {
      font-weight: 700;
      font-size: 1rem;
      margin-top: 0.7rem;
    }
    .price {
      font-weight: 700;
      color: var(--accent);
      margin: 0.25rem 0 0.2rem;
    }
    .product-desc {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-bottom: 0.6rem;
    }
    .buy-btn {
      background: var(--accent);
      border: none;
      padding: 0.5rem 0;
      border-radius: 40px;
      font-weight: 600;
      width: 100%;
      cursor: pointer;
      transition: all 0.2s;
      color: white;
      font-family: inherit;
    }
    .buy-btn:hover {
      filter: brightness(1.08);
      transform: scale(0.98);
    }

    /* Social icons row */
    .social-row {
      display: flex;
      justify-content: center;
      gap: 1.3rem;
      margin: 2rem 0 1.5rem;
    }
    .social-icon {
      background: var(--glass-bg);
      width: 48px;
      height: 48px;
      border-radius: 60px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      color: var(--text-primary);
      transition: all 0.2s ease;
      text-decoration: none;
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(4px);
    }
    .social-icon:hover {
      transform: scale(1.08);
      background: var(--accent);
      color: white;
      box-shadow: 0 0 12px var(--accent-glow);
    }

    /* footer */
    .footer-links {
      text-align: center;
      font-size: 0.7rem;
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      margin-top: 1.8rem;
    }
    .footer-links a, .copyright {
      color: var(--text-secondary);
      text-decoration: none;
    }
    .copyright {
      text-align: center;
      font-size: 0.65rem;
      margin: 0.6rem 0 1.2rem;
    }

    /* floating elements */
    .floating-home {
      position: fixed;
      top: 1rem;
      left: 1rem;
      z-index: 200;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      border-radius: 60px;
      padding: 0.5rem 1rem;
      font-weight: 700;
      font-size: 0.85rem;
      text-decoration: none;
      color: var(--text-primary);
      border: 1px solid var(--glass-border);
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .floating-home:hover {
      background: var(--accent);
      color: white;
      transform: scale(1.02);
    }

    /* share & chat */
    .share-floating {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 200;
    }
    .share-trigger, .qr-trigger {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      width: 48px;
      height: 48px;
      border-radius: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--glass-border);
      transition: all 0.2s;
    }
    .share-trigger:hover, .qr-trigger:hover {
      background: var(--accent);
      color: white;
      transform: scale(1.05);
    }
    .share-menu {
      position: absolute;
      top: 58px;
      right: 0;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border-radius: 1.2rem;
      padding: 0.7rem;
      width: 190px;
      display: none;
      flex-direction: column;
      gap: 0.5rem;
      border: 1px solid var(--glass-border);
    }
    .share-menu.show {
      display: flex;
    }
    .share-opt {
      padding: 0.6rem;
      border-radius: 0.9rem;
      background: transparent;
      border: none;
      font-weight: 500;
      display: flex;
      gap: 0.7rem;
      align-items: center;
      cursor: pointer;
      color: var(--text-primary);
      transition: background 0.2s;
    }
    .share-opt:hover {
      background: var(--accent);
      color: white;
    }

    /* chat admin (whatsapp) */
    .chat-wa {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      z-index: 200;
      background: #25D366;
      width: 54px;
      height: 54px;
      border-radius: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      color: white;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      transition: all 0.2s;
      text-decoration: none;
    }
    .chat-wa:hover {
      transform: scale(1.08);
      background: #128C7E;
    }

    /* QR Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal-content {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border-radius: 2rem;
      padding: 1.5rem;
      text-align: center;
      width: 90%;
      max-width: 320px;
      border: 1px solid var(--glass-border);
    }
    .modal-content canvas {
      background: white;
      padding: 10px;
      border-radius: 1rem;
      margin: 0.5rem auto;
      width: 180px;
    }
    .modal-close, .download-qr-modal {
      margin-top: 0.8rem;
      background: var(--accent);
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      font-weight: 600;
      cursor: pointer;
      margin-right: 0.5rem;
    }

    /* ripple effect container */
    .ripple-effect {
      position: absolute;
      border-radius: 50%;
      background: rgba(212, 63, 52, 0.35);
      transform: scale(0);
      animation: rippleAnim 0.45s linear;
      pointer-events: none;
    }
    @keyframes rippleAnim {
      to {
        transform: scale(3.5);
        opacity: 0;
      }
    }

    .hidden-tab {
      display: none;
    }
  </style>
</head>

      Omoshiroi Japan
      <span class="verified-badge"><i class="fas fa-check-circle"></i> </span>
    </div>

      🌸 Modern Japanese learning platform focused on JLPT preparation, practical language skills, and real-world opportunities in Japan. Helping learners achieve fluency, pass exams, and unlock global careers.

  <!-- LINKS SECTION -->

<div class="share-floating" style="top: 5rem; right: 1rem;">
  <div class="qr-trigger" id="qrModalTrigger">
    <i class="fas fa-qrcode"></i>
  </div>
</div>

  <div class="modal-content">

      <button id="downloadQrModalBtn" class="download-qr-modal">Download PNG</button>
      <button class="modal-close" id="closeModalBtn">Close</button>
    </div>
  </div>
</div>

<script>
  // ---------- ADMIN EDITABLE DATA (easy customization) ----------
  const linksData = [
    { title: "Blog Learning", icon: "fas fa-book-open", url: "https://omoshiroijpn.my.id/jlpt" },
    { title: "Free Hiragana Guide", icon: "fas fa-download", url: "https://omoshiroijpn.my.id/free-guide" },
    { title: "Private Lessons", icon: "fas fa-chalkboard-user", url: "https://omoshiroijpn.my.id/lessons" },
    { title: "Study in Japan", icon: "fas fa-plane", url: "https://omoshiroijpn.my.id/study-abroad" },
    { title: "Test Online", icon: "fas fa-podcast", url: "https://omjtest.pages.dev/en/" },
    ];

  const productsData = [
    {
      img: "https://picsum.photos/id/32/300/200",
      title: "N5・N4 Notion learner",
      price: "Rp.20.000",
      desc: "Digital PDF + study plan",
      affiliateLink: "https://affiliate.link/kanji-workbook"
    },
    {
      img: "https://picsum.photos/id/26/300/200",
      title: "JLPT Mock Exams",
      price: "$29",
      desc: "3 full tests + audio",
      affiliateLink: "https://affiliate.link/jlpt-mock"
    },
    {
      img: "https://picsum.photos/id/20/300/200",
      title: "Speaking Masterclass",
      price: "$39",
      desc: "Video course + templates",
      affiliateLink: "https://affiliate.link/speaking"
    },
    {
      img: "https://picsum.photos/id/0/300/200",
      title: "Japan Job Guide",
      price: "$14",
      desc: "Resume & interview prep",
      affiliateLink: "https://affiliate.link/job-guide"
    },
    {
      img: "https://picsum.photos/id/0/300/200",
      title: "Japan Job Guide",
      price: "$14",
      desc: "Resume & interview prep",
      affiliateLink: "https://affiliate.link/job-guide"
    }
  ];

  const socialData = [
    { platform: "instagram", icon: "fab fa-instagram", url: "https://instagram.com/omoshiroi.japan" },
    { platform: "tiktok", icon: "fab fa-tiktok", url: "https://tiktok.com/@omoshiroi.japan" },
    { platform: "youtube", icon: "fab fa-youtube", url: "https://youtube.com/@omoshiroijapan" },
    { platform: "pinterest", icon: "fab fa-pinterest", url: "https://pinterest.com/omoshiroijapan" }
  ];

  // ---------- RENDER FUNCTIONS ----------
  function renderLinks() {
    const container = document.getElementById('linksGrid');
    if (!container) return;
    container.innerHTML = '';
    linksData.forEach(link => {
      const btn = document.createElement('a');
      btn.className = 'link-btn';
      btn.href = link.url;
      btn.target = '_blank';
      btn.innerHTML = `<i class="${link.icon}"></i><span>${link.title}</span>`;
      container.appendChild(btn);
    });
  }

  function renderShop() {
    const container = document.getElementById('shopGrid');
    if (!container) return;
    container.innerHTML = '';
    productsData.forEach(prod => {
      const card = document.createElement('div');
      card.className = 'product-card';
      card.innerHTML = `
        <img class="product-img" src="${prod.img}" alt="${prod.title}" loading="lazy">
        <div class="product-title">${prod.title}</div>
        <div class="price">${prod.price}</div>
        <div class="product-desc">${prod.desc}</div>
        <button class="buy-btn" data-link="${prod.affiliateLink}">Buy →</button>
      `;
      container.appendChild(card);
    });
    // attach buy events
    document.querySelectorAll('.buy-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const url = btn.getAttribute('data-link');
        if (url) window.open(url, '_blank');
        addRipple(e, btn);
      });
    });
  }

  function renderSocial() {
    const container = document.getElementById('socialRow');
    if (!container) return;
    container.innerHTML = '';
    socialData.forEach(soc => {
      const a = document.createElement('a');
      a.className = 'social-icon';
      a.href = soc.url;
      a.target = '_blank';
      a.innerHTML = `<i class="${soc.icon}"></i>`;
      container.appendChild(a);
    });
  }

  // ---------- MICRO-INTERACTIONS: RIPPLE + CLICK FEEDBACK (CSS already handles scale/opacity) ----------
  function addRipple(event, element) {
    const rect = element.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height);
    const ripple = document.createElement('span');
    ripple.className = 'ripple-effect';
    const x = event.clientX - rect.left - size / 2;
    const y = event.clientY - rect.top - size / 2;
    ripple.style.width = ripple.style.height = `${size}px`;
    ripple.style.left = `${x}px`;
    ripple.style.top = `${y}px`;
    ripple.style.position = 'absolute';
    element.style.position = 'relative';
    element.style.overflow = 'hidden';
    element.appendChild(ripple);
    setTimeout(() => ripple.remove(), 500);
  }

  function attachRipplesToInteractive() {
    const interactives = document.querySelectorAll('.link-btn, .buy-btn, .social-icon, .tab-btn, .share-trigger, .qr-trigger, .chat-wa, .floating-home');
    interactives.forEach(el => {
      el.addEventListener('click', function(e) {
        addRipple(e, this);
      });
    });
  }

  // ---------- TAB SWITCHING (Links / Shop) ----------
  const linksSection = document.getElementById('linksSection');
  const shopSection = document.getElementById('shopSection');
  const tabBtns = document.querySelectorAll('.tab-btn');
  function switchTab(tabId) {
    if (tabId === 'links') {
      linksSection.classList.remove('hidden-tab');
      shopSection.classList.add('hidden-tab');
      tabBtns.forEach(btn => btn.getAttribute('data-tab') === 'links' ? btn.classList.add('active') : btn.classList.remove('active'));
    } else {
      linksSection.classList.add('hidden-tab');
      shopSection.classList.remove('hidden-tab');
      tabBtns.forEach(btn => btn.getAttribute('data-tab') === 'shop' ? btn.classList.add('active') : btn.classList.remove('active'));
    }
  }
  tabBtns.forEach(btn => {
    btn.addEventListener('click', (e) => {
      switchTab(btn.getAttribute('data-tab'));
      addRipple(e, btn);
    });
  });

  // ---------- SHARE FEATURE ----------
  const shareTrigger = document.getElementById('shareTrigger');
  const shareMenu = document.getElementById('shareMenu');
  shareTrigger.addEventListener('click', (e) => {
    e.stopPropagation();
    shareMenu.classList.toggle('show');
  });
  document.addEventListener('click', (e) => {
    if (!shareTrigger.contains(e.target) && !shareMenu.contains(e.target)) shareMenu.classList.remove('show');
  });
  function showToast(msg) {
    const toast = document.createElement('div');
    toast.innerText = msg;
    toast.style.position = 'fixed';
    toast.style.bottom = '30px';
    toast.style.left = '50%';
    toast.style.transform = 'translateX(-50%)';
    toast.style.background = '#1E2F3A';
    toast.style.color = '#fff';
    toast.style.padding = '8px 20px';
    toast.style.borderRadius = '40px';
    toast.style.fontSize = '0.8rem';
    toast.style.zIndex = '999';
    toast.style.backdropFilter = 'blur(8px)';
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2200);
  }
  document.getElementById('copyLinkBtn').addEventListener('click', () => {
    navigator.clipboard.writeText(window.location.href);
    showToast('✅ Link copied to clipboard');
    shareMenu.classList.remove('show');
  });
  document.getElementById('whatsappShareBtn').addEventListener('click', () => {
    const text = encodeURIComponent(`Check out Omoshiroi Japan: ${window.location.href}`);
    window.open(`https://wa.me/?text=${text}`, '_blank');
    shareMenu.classList.remove('show');
  });
  document.getElementById('instagramShareBtn').addEventListener('click', () => {
    if (navigator.share) {
      navigator.share({ title: 'Omoshiroi Japan', url: window.location.href });
    } else {
      navigator.clipboard.writeText(window.location.href);
      showToast('📋 Link copied! Share on Instagram story.');
    }
    shareMenu.classList.remove('show');
  });

  // ---------- QR MODAL + GENERATE + DOWNLOAD ----------
  const modal = document.getElementById('qrModal');
  const qrModalContainer = document.getElementById('qrCanvasModal');
  let currentQrCanvas = null;

  function generateQRModal() {
    qrModalContainer.innerHTML = '';
    QRCode.toCanvas(window.location.href, { width: 200, margin: 1, color: { dark: '#D43F34', light: '#FFFFFF' } }, (err, canvas) => {
      if (err) console.error(err);
      else {
        qrModalContainer.appendChild(canvas);
        currentQrCanvas = canvas;
      }
    });
  }

  document.getElementById('qrModalTrigger').addEventListener('click', () => {
    modal.style.display = 'flex';
    generateQRModal();
  });
  document.getElementById('closeModalBtn').addEventListener('click', () => {
    modal.style.display = 'none';
  });
  document.getElementById('downloadQrModalBtn').addEventListener('click', () => {
    if (currentQrCanvas) {
      const link = document.createElement('a');
      link.download = 'omoshiroi_qrcode.png';
      link.href = currentQrCanvas.toDataURL();
      link.click();
    } else {
      alert('QR not ready');
    }
  });
  modal.addEventListener('click', (e) => {
    if (e.target === modal) modal.style.display = 'none';
  });

  // ---------- INITIALIZE ----------
  function init() {
    renderLinks();
    renderShop();
    renderSocial();
    attachRipplesToInteractive();
    // ensure shop hidden initially
    shopSection.classList.add('hidden-tab');
    linksSection.classList.remove('hidden-tab');
  }
  init();
</script>
</body>
</html>
