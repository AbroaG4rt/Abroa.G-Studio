<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Abroa.g Studio — Creative Link Hub | Services</title>
  <!-- Google Fonts + Font Awesome -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- QR Code Generator (lightweight) -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
  <style>
    /* ---------- GLOBAL RESET & VARIABLES ---------- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-gif-url: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEg7EWhOORLJO8COuyX0mrYVeLUuiU0VDcSuuMza9A0u4BkLwo1Sxl_PfVOAf0hNMU-Gklvs7_sMtu0moQatNMEwYQEFTHCKzNOWb0A9vD_aPhPVk2ZlDKFz3bvuGCk7qqLlx_W8zy8sxrOMU_Z8A2iQzov81mSWWhQhEc3rUfFqrDrukg4zVAQn8daB11O4/s480/03.GIF');
      --overlay-color: rgba(0, 0, 0, 0.45);
      --glass-bg: rgba(255, 255, 255, 0.78);
      --glass-border: rgba(255, 255, 255, 0.5);
      --card-bg: rgba(255, 255, 255, 0.85);
      --text-primary: #1A1E2B;
      --text-secondary: #4A5568;
      --accent: #C084FC;       /* soft purple – modern studio vibe */
      --accent-glow: rgba(192, 132, 252, 0.35);
      --shadow-sm: 0 12px 30px -10px rgba(0, 0, 0, 0.08);
      --shadow-md: 0 20px 35px -12px rgba(0, 0, 0, 0.15);
      --transition-fast: 0.12s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      --transition-hover: 0.18s ease-out;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #F9F7FE;
      color: var(--text-primary);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    /* ---------- ANIMATED GIF BACKGROUND (configurable, semi-transparent) ---------- */
    .bg-gif-layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: var(--bg-gif-url);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0.80;
      z-index: -2;
      pointer-events: none;
    }

    /* Soft blur overlay for extra readability */
    .bg-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 50% 30%, rgba(255,255,240,0.2), rgba(0,0,0,0.15));
      backdrop-filter: blur(2px);
      z-index: -1;
    }

    /* ---------- GLASS CARD + MAIN LAYOUT ---------- */
    .container {
      max-width: 780px;
      margin: 1.8rem auto;
      padding: 0 1.2rem;
      position: relative;
      z-index: 2;
    }

    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      border-radius: 2.2rem;
      border: 1px solid var(--glass-border);
      box-shadow: var(--shadow-sm);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    /* profile section */
    .profile {
      text-align: center;
      padding: 2rem 1.5rem 1.5rem;
      margin-bottom: 1.8rem;
    }

    .avatar {
      width: 112px;
      height: 112px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--accent);
      box-shadow: 0 20px 30px -12px rgba(0,0,0,0.2);
      transition: transform 0.2s ease;
    }
    .avatar:hover {
      transform: scale(1.02);
    }

    .username {
      font-size: 1.9rem;
      font-weight: 800;
      margin-top: 1rem;
      letter-spacing: -0.02em;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .verified-badge {
      background: var(--accent);
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.2rem 0.7rem;
      border-radius: 60px;
      color: #1A1E2B;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .bio {
      color: var(--text-secondary);
      margin-top: 0.8rem;
      font-weight: 450;
      line-height: 1.4;
      max-width: 90%;
      margin-left: auto;
      margin-right: auto;
    }

    /* Tabs (Links / Services / Shop) */
    .tabs {
      display: flex;
      gap: 0.8rem;
      background: rgba(255,255,255,0.4);
      backdrop-filter: blur(8px);
      padding: 0.5rem;
      border-radius: 100px;
      width: fit-content;
      margin: 0 auto 2rem auto;
      border: 1px solid var(--glass-border);
    }

    .tab-btn {
      background: transparent;
      border: none;
      padding: 0.6rem 1.8rem;
      font-weight: 600;
      border-radius: 60px;
      font-size: 0.95rem;
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.2s ease;
      font-family: inherit;
    }

    .tab-btn.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 6px 14px var(--accent-glow);
    }

    /* Link Buttons (core) */
    .links-grid {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .link-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      background: var(--card-bg);
      backdrop-filter: blur(4px);
      padding: 1rem 1.2rem;
      border-radius: 60px;
      text-decoration: none;
      color: var(--text-primary);
      font-weight: 600;
      font-size: 1rem;
      border: 1px solid rgba(255,255,255,0.35);
      transition: all var(--transition-hover);
      box-shadow: var(--shadow-sm);
      cursor: pointer;
    }

    .link-btn i {
      font-size: 1.3rem;
      color: var(--accent);
      transition: transform 0.2s;
    }

    .link-btn:hover {
      transform: scale(1.02) translateY(-2px);
      box-shadow: 0 18px 30px -12px var(--accent-glow);
      border-color: var(--accent);
    }

    .link-btn:active, .buy-btn:active, .social-icon:active, .tab-btn:active, .service-btn:active {
      transform: scale(0.96);
      transition: transform var(--transition-fast);
    }

    /* Shop grid + Services grid unified style */
    .shop-grid, .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1.5rem;
    }

    @media (max-width: 640px) {
      .shop-grid, .services-grid {
        display: flex;
        overflow-x: auto;
        scroll-snap-type: x mandatory;
        gap: 1rem;
        padding-bottom: 0.8rem;
      }
      .product-card, .service-card {
        flex: 0 0 80%;
        scroll-snap-align: start;
      }
    }

    .product-card, .service-card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border-radius: 1.5rem;
      padding: 1rem;
      transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      border: 1px solid var(--glass-border);
    }

    .product-card:hover, .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-md);
      border-color: var(--accent);
    }

    .product-img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 1.2rem;
      background: #edeef2;
    }

    .product-title, .service-title {
      font-weight: 700;
      font-size: 1.1rem;
      margin-top: 0.8rem;
    }

    .price {
      font-weight: 700;
      color: var(--accent);
      margin: 0.3rem 0 0.2rem;
    }

    .product-desc, .service-desc {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-bottom: 0.7rem;
    }

    .buy-btn, .service-btn {
      background: var(--accent);
      border: none;
      padding: 0.6rem 0;
      border-radius: 60px;
      font-weight: 600;
      width: 100%;
      cursor: pointer;
      transition: all 0.2s;
      color: #1A1E2B;
      font-family: inherit;
      text-align: center;
      display: inline-block;
    }

    .buy-btn:hover, .service-btn:hover {
      filter: brightness(1.06);
      transform: scale(0.98);
    }

    /* service specific icon */
    .service-icon {
      font-size: 2.2rem;
      color: var(--accent);
      margin: 0.5rem 0 0.2rem;
      text-align: center;
    }

    /* social icons row */
    .social-row {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin: 2rem 0 1.5rem;
    }

    .social-icon {
      background: var(--glass-bg);
      width: 48px;
      height: 48px;
      border-radius: 60px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      color: var(--text-primary);
      transition: all 0.2s ease;
      text-decoration: none;
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(4px);
    }

    .social-icon:hover {
      transform: scale(1.1);
      background: var(--accent);
      color: white;
      box-shadow: 0 0 15px var(--accent-glow);
    }

    /* footer */
    .footer-links {
      text-align: center;
      font-size: 0.75rem;
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      margin-top: 2rem;
    }
    .footer-links a, .copyright {
      color: var(--text-secondary);
      text-decoration: none;
    }
    .copyright {
      text-align: center;
      font-size: 0.7rem;
      margin: 1rem 0 1.5rem;
    }

    /* floating buttons (logo home + share) */
    .floating-home {
      position: fixed;
      top: 1.2rem;
      left: 1.2rem;
      z-index: 200;
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      border-radius: 60px;
      padding: 0.6rem 1.2rem;
      font-weight: 700;
      text-decoration: none;
      color: var(--text-primary);
      border: 1px solid var(--glass-border);
      transition: all 0.2s;
      font-size: 0.9rem;
      box-shadow: var(--shadow-sm);
    }
    .floating-home i {
      margin-right: 6px;
    }
    .floating-home:hover {
      background: var(--accent);
      color: white;
      transform: scale(1.02);
    }

    .share-floating {
      position: fixed;
      top: 1.2rem;
      right: 1.2rem;
      z-index: 200;
    }
    .share-trigger {
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      width: 48px;
      height: 48px;
      border-radius: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--glass-border);
      transition: all 0.2s;
    }
    .share-trigger:hover {
      background: var(--accent);
      color: white;
      transform: scale(1.05);
    }
    .share-menu {
      position: absolute;
      top: 58px;
      right: 0;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border-radius: 1.2rem;
      padding: 0.7rem;
      width: 190px;
      display: none;
      flex-direction: column;
      gap: 0.5rem;
      border: 1px solid var(--glass-border);
      box-shadow: var(--shadow-md);
    }
    .share-menu.show {
      display: flex;
    }
    .share-opt {
      padding: 0.6rem;
      border-radius: 0.9rem;
      background: transparent;
      border: none;
      font-weight: 500;
      display: flex;
      gap: 0.7rem;
      align-items: center;
      cursor: pointer;
      color: var(--text-primary);
      transition: background 0.2s;
    }
    .share-opt:hover {
      background: var(--accent);
      color: #fff;
    }

    /* QR MODAL */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(6px);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal-content {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border-radius: 2rem;
      padding: 1.8rem;
      text-align: center;
      width: 90%;
      max-width: 320px;
      border: 1px solid var(--glass-border);
      box-shadow: var(--shadow-md);
    }
    .modal-content canvas {
      background: white;
      padding: 10px;
      border-radius: 1rem;
      margin: 1rem auto;
      width: 180px;
      height: auto;
    }
    .modal-close {
      margin-top: 1rem;
      background: var(--accent);
      border: none;
      padding: 0.5rem 1.2rem;
      border-radius: 2rem;
      font-weight: 600;
      cursor: pointer;
    }
    .download-qr {
      background: var(--accent);
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      font-weight: 600;
      margin-top: 0.5rem;
      cursor: pointer;
    }

    /* ripple effect container */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(192, 132, 252, 0.4);
      transform: scale(0);
      animation: rippleAnim 0.5s linear;
      pointer-events: none;
    }
    @keyframes rippleAnim {
      to {
        transform: scale(4);
        opacity: 0;
      }
    }

    /* hidden utility */
    .hidden-tab {
      display: none;
    }

    /* responsive adjustments */
    @media (max-width: 580px) {
      .container {
        padding: 0 1rem;
        margin: 1rem auto;
      }
      .username {
        font-size: 1.6rem;
      }
      .link-btn {
        padding: 0.85rem 1rem;
      }
    }
  </style>
</head>
<body>

<div class="bg-gif-layer"></div>
<div class="bg-overlay"></div>

<!-- Floating Home Button -->
<a href="https://abroag.site" target="_blank" class="floating-home">
  <i class="fas fa-crown"></i> Abroa.g
</a>

<!-- Floating Share Button -->
<div class="share-floating">
  <div class="share-trigger" id="shareTrigger">
    <i class="fas fa-share-alt"></i>
  </div>
  <div class="share-menu" id="shareMenu">
    <button class="share-opt" id="copyLinkBtn"><i class="fas fa-link"></i> Copy link</button>
    <button class="share-opt" id="whatsappShareBtn"><i class="fab fa-whatsapp"></i> WhatsApp</button>
    <button class="share-opt" id="instagramShareBtn"><i class="fab fa-instagram"></i> Instagram</button>
  </div>
</div>

<!-- Main Content Container -->
<div class="container">
  <!-- Profile Section -->
  <div class="glass-card profile">
    <img class="avatar" src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEh8MS5-7s-lmfs-FKe_c9E73N7Hy-J7mWvqjYcPvYaB9u8RPgniNgB9mKTf5RwkNfPIf1zQ_58ANKxkffXg4vxxxhF7U93CWMNu4qDxuvqnwQz0Mkw2SyKT-aVPHHewV7InNGp2aY-z3r9N2jUd_-MXKNfxYg4aB1zeNHC-cS8C4X43ccqbofoREd0UyKo/s128/2icon.png" alt="Abroa.g Studio Logo">
    <div class="username">
      Abroa.g Studio
      <span class="verified-badge"><i class="fas fa-check-circle"></i> Verified</span>
    </div>
    <div class="bio">
      Creative brand and web design studio crafting clean, strategic digital experiences for modern businesses.
    </div>
  </div>

  <!-- TABS: Links | Services (new) | Shop -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="links">🔗 Links</button>
    <button class="tab-btn" data-tab="services">🌱 Projects</button>
    <button class="tab-btn" data-tab="shop">🛍️ Shop</button>
  </div>

  <!-- Links Section -->
  <div id="linksSection" class="links-section">
    <div class="links-grid" id="linksGrid"></div>
  </div>

  <!-- NEW Services Section (middle tab) -->
  <div id="servicesSection" class="services-section hidden-tab">
    <div class="services-grid" id="servicesGrid"></div>
  </div>

  <!-- Shop Section -->
  <div id="shopSection" class="shop-section hidden-tab">
    <div class="shop-grid" id="shopGrid"></div>
  </div>

  <!-- Social Icons Row -->
  <div class="social-row" id="socialRow"></div>

  <!-- Footer -->
  <div class="footer-links">
    <a href="#">Privacy Policy</a>
    <a href="#">Terms of Service</a>
  </div>
  <div class="copyright">© 2025 Abroa.g Studio — all rights reserved</div>
</div>

<!-- QR Code Modal -->
<div id="qrModal" class="modal">
  <div class="modal-content">
    <h3><i class="fas fa-qrcode"></i> Scan & Share</h3>
    <div id="qrCanvasContainer"></div>
    <button id="downloadQrBtn" class="download-qr">Download PNG</button>
    <br>
    <button class="modal-close" id="closeModalBtn">Close</button>
  </div>
</div>

<script>
  // ---------- ADMIN CUSTOMIZATION ----------
  // Links data (unchanged)
  const linksData = [
    { title: "Portfolio", icon: "fas fa-briefcase", url: "https://abroag.site/public/mockups/" },
    { title: "Services", icon: "fas fa-palette", url: "https://abroag.site/services" },
    { title: "Shop", icon: "fas fa-store", url: "https://abroag.site/public/mockups/" },
    { title: "colaboration", icon: "fa fa-users", url: "https://abroag.site/public/collaborate" },
    { title: "Inquiry Our Team", icon: "fas fa-calendar-alt", url: "https://abroag.site/public/talents/hire-talent" }
  ];

  // Shop products (unchanged)
  const productsData = [
    {
      img: "https://picsum.photos/id/20/300/200",
      title: "Brand Identity Kit",
      price: "$89",
      desc: "Complete visual identity system",
      affiliateLink: "https://example.com/brandkit"
    },
    {
      img: "https://picsum.photos/id/26/300/200",
      title: "UI Library Pro",
      price: "$49",
      desc: "Modern component library",
      affiliateLink: "https://example.com/ui-library"
    },
    {
      img: "https://picsum.photos/id/0/300/200",
      title: "Typography Masterclass",
      price: "$39",
      desc: "Video course + resources",
      affiliateLink: "https://example.com/typo-course"
    },
    {
      img: "https://picsum.photos/id/1/300/200",
      title: "Webflow Template",
      price: "$79",
      desc: "Agency ready template",
      affiliateLink: "https://example.com/webflow"
    }
  ];

  // NEW: Services Data (customizable for the middle tab)
  const servicesData = [
    {
      icon: "fa-solid fa-person",
      title: "Personal Profile",
      description: "Market analysis, identity positioning & storytelling.",
      ctaLink: "https://abroag.site/services/brand-strategy",
      ctaText: "Explore →"
    },
    {
      icon: "fa-solid fa-torii-gate",
      title: "Japanese Learning",
      description: "Learning japanese by self.",
      ctaLink: "https://www.omoshiroijpn.my.id/",
      ctaText: "Explore →"
    },
    {
      icon: "fa-brands fa-r-project",
      title: "Daily BLog",
      description: "All project and my story.",
      ctaLink: "https://www.rohmanag.fun/",
      ctaText: "Explore →"
    },
    {
      icon: "fas fa-lightbulb",
      title: "Creative Consulting",
      description: "Expert guidance to elevate your brand identity.",
      ctaLink: "https://abroag.site/services/consulting",
      ctaText: "Learn more →"
    }
  ];

  const socialData = [
    { platform: "instagram", icon: "fab fa-instagram", url: "https://instagram.com/abroag.studio" },
    { platform: "tiktok", icon: "fab fa-tiktok", url: "https://tiktok.com/@abroag.studio" },
    { platform: "youtube", icon: "fab fa-youtube", url: "https://youtube.com/@abroagstudio" },
    { platform: "pinterest", icon: "fab fa-pinterest", url: "https://id.pinterest.com/abroaga/" }
  ];

  // ---------- RENDER FUNCTIONS ----------
  function renderLinks() {
    const container = document.getElementById('linksGrid');
    if (!container) return;
    container.innerHTML = '';
    linksData.forEach(link => {
      const btn = document.createElement('a');
      btn.className = 'link-btn';
      btn.href = link.url;
      btn.target = '_blank';
      btn.setAttribute('data-ripple', 'true');
      btn.innerHTML = `<i class="${link.icon}"></i><span>${link.title}</span>`;
      container.appendChild(btn);
    });
  }

  function renderShop() {
    const container = document.getElementById('shopGrid');
    if (!container) return;
    container.innerHTML = '';
    productsData.forEach(prod => {
      const card = document.createElement('div');
      card.className = 'product-card';
      card.innerHTML = `
        <img class="product-img" src="${prod.img}" alt="${prod.title}">
        <div class="product-title">${prod.title}</div>
        <div class="price">${prod.price}</div>
        <div class="product-desc">${prod.desc}</div>
        <button class="buy-btn" data-link="${prod.affiliateLink}">Buy →</button>
      `;
      container.appendChild(card);
    });
    document.querySelectorAll('.buy-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const url = btn.getAttribute('data-link');
        if (url) window.open(url, '_blank');
        addRippleEffect(e, btn);
      });
    });
  }

  // NEW: render Services for middle tab
  function renderServices() {
    const container = document.getElementById('servicesGrid');
    if (!container) return;
    container.innerHTML = '';
    servicesData.forEach(service => {
      const card = document.createElement('div');
      card.className = 'service-card';
      card.innerHTML = `
        <div class="service-icon"><i class="${service.icon}"></i></div>
        <div class="service-title">${service.title}</div>
        <div class="service-desc">${service.description}</div>
        <button class="service-btn" data-link="${service.ctaLink}">${service.ctaText}</button>
      `;
      container.appendChild(card);
    });
    // attach event listeners to service buttons
    document.querySelectorAll('.service-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const url = btn.getAttribute('data-link');
        if (url) window.open(url, '_blank');
        addRippleEffect(e, btn);
      });
    });
  }

  function renderSocialIcons() {
    const container = document.getElementById('socialRow');
    if (!container) return;
    container.innerHTML = '';
    socialData.forEach(social => {
      const iconLink = document.createElement('a');
      iconLink.className = 'social-icon';
      iconLink.href = social.url;
      iconLink.target = '_blank';
      iconLink.innerHTML = `<i class="${social.icon}"></i>`;
      container.appendChild(iconLink);
    });
  }

  // ---------- TAB SWITCHING (Links, Services, Shop) ----------
  const linksSection = document.getElementById('linksSection');
  const servicesSection = document.getElementById('servicesSection');
  const shopSection = document.getElementById('shopSection');
  const tabBtns = document.querySelectorAll('.tab-btn');

  function switchTab(tabId) {
    // hide all sections
    linksSection.classList.add('hidden-tab');
    servicesSection.classList.add('hidden-tab');
    shopSection.classList.add('hidden-tab');
    
    // show selected + update active class
    if (tabId === 'links') {
      linksSection.classList.remove('hidden-tab');
    } else if (tabId === 'services') {
      servicesSection.classList.remove('hidden-tab');
    } else if (tabId === 'shop') {
      shopSection.classList.remove('hidden-tab');
    }
    
    tabBtns.forEach(btn => {
      if (btn.getAttribute('data-tab') === tabId) {
        btn.classList.add('active');
      } else {
        btn.classList.remove('active');
      }
    });
  }

  tabBtns.forEach(btn => {
    btn.addEventListener('click', (e) => {
      const tab = btn.getAttribute('data-tab');
      switchTab(tab);
      addRippleEffect(e, btn);
    });
  });

  // ---------- RIPPLE EFFECT (micro-interaction) ----------
  function addRippleEffect(event, element) {
    const rect = element.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height);
    const ripple = document.createElement('span');
    ripple.className = 'ripple';
    const x = event.clientX - rect.left - size / 2;
    const y = event.clientY - rect.top - size / 2;
    ripple.style.width = ripple.style.height = `${size}px`;
    ripple.style.left = `${x}px`;
    ripple.style.top = `${y}px`;
    ripple.style.position = 'absolute';
    element.style.position = 'relative';
    element.style.overflow = 'hidden';
    element.appendChild(ripple);
    setTimeout(() => ripple.remove(), 500);
  }

  function attachRipples() {
    const interactive = document.querySelectorAll('.link-btn, .buy-btn, .social-icon, .tab-btn, .share-trigger, .floating-home, .service-btn');
    interactive.forEach(el => {
      el.addEventListener('click', function(e) {
        addRippleEffect(e, this);
      });
    });
  }

  // ---------- SHARE FEATURE (unchanged) ----------
  const shareTrigger = document.getElementById('shareTrigger');
  const shareMenu = document.getElementById('shareMenu');
  shareTrigger.addEventListener('click', (e) => {
    e.stopPropagation();
    shareMenu.classList.toggle('show');
  });
  document.addEventListener('click', (e) => {
    if (!shareTrigger.contains(e.target) && !shareMenu.contains(e.target)) shareMenu.classList.remove('show');
  });

  function showToast(msg) {
    const toast = document.createElement('div');
    toast.innerText = msg;
    toast.style.position = 'fixed';
    toast.style.bottom = '30px';
    toast.style.left = '50%';
    toast.style.transform = 'translateX(-50%)';
    toast.style.background = '#1A1E2B';
    toast.style.color = '#fff';
    toast.style.padding = '8px 18px';
    toast.style.borderRadius = '40px';
    toast.style.fontSize = '0.8rem';
    toast.style.zIndex = '999';
    toast.style.backdropFilter = 'blur(8px)';
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
  }

  document.getElementById('copyLinkBtn').addEventListener('click', () => {
    navigator.clipboard.writeText(window.location.href);
    showToast('✅ Link copied to clipboard');
    shareMenu.classList.remove('show');
  });
  document.getElementById('whatsappShareBtn').addEventListener('click', () => {
    const text = encodeURIComponent(`Check out Abroa.g Studio: ${window.location.href}`);
    window.open(`https://wa.me/?text=${text}`, '_blank');
    shareMenu.classList.remove('show');
  });
  document.getElementById('instagramShareBtn').addEventListener('click', () => {
    if (navigator.share) {
      navigator.share({ title: 'Abroa.g Studio', url: window.location.href });
    } else {
      navigator.clipboard.writeText(window.location.href);
      showToast('📋 Link copied! Share on Instagram story.');
    }
    shareMenu.classList.remove('show');
  });

  // ---------- QR CODE MODAL ----------
  const modal = document.getElementById('qrModal');
  const qrContainer = document.getElementById('qrCanvasContainer');
  let currentQRCanvas = null;

  function openQRModal() {
    modal.style.display = 'flex';
    qrContainer.innerHTML = '';
    QRCode.toCanvas(window.location.href, { width: 180, margin: 1 }, (err, canvas) => {
      if (err) console.error(err);
      else {
        qrContainer.appendChild(canvas);
        currentQRCanvas = canvas;
      }
    });
  }

  // Floating QR button
  const qrFloating = document.createElement('div');
  qrFloating.innerHTML = '<i class="fas fa-qrcode"></i>';
  qrFloating.style.position = 'fixed';
  qrFloating.style.bottom = '1.5rem';
  qrFloating.style.right = '1.5rem';
  qrFloating.style.background = 'var(--glass-bg)';
  qrFloating.style.backdropFilter = 'blur(10px)';
  qrFloating.style.width = '48px';
  qrFloating.style.height = '48px';
  qrFloating.style.borderRadius = '60px';
  qrFloating.style.display = 'flex';
  qrFloating.style.alignItems = 'center';
  qrFloating.style.justifyContent = 'center';
  qrFloating.style.fontSize = '1.3rem';
  qrFloating.style.cursor = 'pointer';
  qrFloating.style.border = '1px solid var(--glass-border)';
  qrFloating.style.zIndex = '200';
  qrFloating.style.boxShadow = 'var(--shadow-sm)';
  qrFloating.addEventListener('click', openQRModal);
  document.body.appendChild(qrFloating);

  document.getElementById('closeModalBtn').addEventListener('click', () => {
    modal.style.display = 'none';
  });
  document.getElementById('downloadQrBtn').addEventListener('click', () => {
    if (currentQRCanvas) {
      const link = document.createElement('a');
      link.download = 'abroag_qrcode.png';
      link.href = currentQRCanvas.toDataURL();
      link.click();
    } else {
      alert('QR code not ready');
    }
  });
  modal.addEventListener('click', (e) => {
    if (e.target === modal) modal.style.display = 'none';
  });

  // ---------- INITIALIZE PAGE ----------
  function init() {
    renderLinks();
    renderShop();
    renderServices();     // NEW: services section rendering
    renderSocialIcons();
    attachRipples();
    // set default visible section: links (active)
    switchTab('links');
  }

  init();
</script>
</body>
</html>
